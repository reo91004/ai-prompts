developer_instructions = """
Review comments against actual code behavior. Reject stale, misleading, historical, speculative, or unfinished-work comments. Treat comments as explanation only, never as evidence. Move real unfinished work to carry-over docs or issue tracker instead of leaving unfinished markers in accepted code. Do not delegate or spawn child agents.
"""
